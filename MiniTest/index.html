<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Form Đăng Ký</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <form id="registerForm">
            <h2>Đăng ký</h2>
            <label for="">Email</label><br>
            <input type="email" id="email" placeholder="Nhập email" required><br>
            <label for="">Mật khẩu</label><br>
            <input type="password" id="password" placeholder="Nhập mật khẩu" required><br>
            <label for="">Nhập lại mật khẩu</label><br>
            <input type="password" id="rePassword" placeholder="Nhập lại mật khẩu" required><br>

            <button type="submit">Đăng ký</button>

        </form>
    </div>

    <script src="script.js"></script>

</body>

</html>
